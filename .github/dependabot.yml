version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "next"
        update-types: ["major"]
    automerge:
      - branch: "main"
        match:
          dependency-type: "production"
          update-types:
            - "patch"
        commit-message:
          prefix: "chore"
          include: "scope"

  - package-ecosystem: "cargo"
    directory: "/contracts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    automerge:
      - branch: "main"
        match:
          update-types:
            - "patch"
        commit-message:
          prefix: "chore"
          include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    automerge:
      - branch: "main"
        match:
          update-types:
            - "patch"
        commit-message:
          prefix: "chore"
          include: "scope"