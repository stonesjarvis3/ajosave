name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.STAGING_URL }}
          NEXT_PUBLIC_APP_NAME: Ajosave Staging
          NEXTAUTH_URL: ${{ vars.STAGING_URL }}
          NEXTAUTH_SECRET: ${{ secrets.STAGING_NEXTAUTH_SECRET }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          STELLAR_NETWORK: testnet
          STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
          STELLAR_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          STELLAR_AJO_CONTRACT_ID: ${{ secrets.STELLAR_TESTNET_CONTRACT_ID }}
          STELLAR_SERVER_SECRET_KEY: ${{ secrets.STELLAR_TESTNET_SECRET_KEY }}
          STELLAR_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          USDC_ISSUER: GBBD47IF6LWK7P7MDEVSCWR7DPUWV3NY3DTQEVFL4NAT4AQH3ZLLFLA5
          USDC_ASSET_CODE: USDC
          PAYSTACK_SECRET_KEY: ${{ secrets.STAGING_PAYSTACK_SECRET_KEY }}
          TERMII_API_KEY: ${{ secrets.STAGING_TERMII_API_KEY }}
          REDIS_URL: ${{ secrets.STAGING_REDIS_URL }}
          CRON_SECRET: ${{ secrets.STAGING_CRON_SECRET }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        id: vercel
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prebuilt"
      - name: Post Staging URL to PR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
        with:
          script: |
            // Get the latest merged PR
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              per_page: 1
            });
            
            if (commits.length > 0) {
              const commitSha = commits[0].sha;
              const { data: pullRequests } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed',
                sort: 'updated',
                direction: 'desc',
                per_page: 5
              });
              
              const mergedPR = pullRequests.find(pr => 
                pr.merge_commit_sha === commitSha || 
                (pr.merge_commit_sha && pr.merge_commit_sha.startsWith(commitSha.substring(0, 7)))
              );
              
              if (mergedPR) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: mergedPR.number,
                  body: `## 🚀 Staging Deployment
                  
| Environment | URL |
|-------------|-----|
| Staging | ${process.env.STAGING_URL || 'https://staging.ajosave.app'} |

✅ Staging has been deployed with testnet contract settings.
`
                });
              }
            }

  deploy-contract-testnet:
    name: Deploy Contract to Testnet
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: contracts }
      - name: Build contract WASM
        working-directory: contracts
        run: cargo build --target wasm32-unknown-unknown --release
      - name: Install Stellar CLI
        run: |
          curl -sSL https://github.com/stellar/stellar-cli/releases/latest/download/stellar-cli-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Deploy to testnet
        env:
          STELLAR_NETWORK: testnet
          STELLAR_SERVER_SECRET_KEY: ${{ secrets.STELLAR_TESTNET_SECRET_KEY }}
        run: npm run contract:deploy
      - name: Print contract ID
        run: cat .contract-id
      - name: Verify deployed contract
        env:
          STELLAR_NETWORK: testnet
          STELLAR_SERVER_SECRET_KEY: ${{ secrets.STELLAR_TESTNET_SECRET_KEY }}
        run: npm run contract:verify
      - name: Upload deploy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-deploy-artifacts
          path: deploy-artifacts/
          retention-days: 30
